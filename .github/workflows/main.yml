name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Джоб для лінтера
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: HTML Hint
        uses: htmlhint/HTMLHint-action@v2
        with:
          target: 'index.html'

  # 2. Джоб для збірки та пушу в Registry
  build-and-push:
    needs: linter # Запускати тільки якщо лінтер пройшов успішно
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Дозвіл на запис у GitHub Packages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Назва імежду буде: ghcr.io/твій-логін/назва-репо:latest
          tags: ghcr.io/${{ github.repository }}:latest